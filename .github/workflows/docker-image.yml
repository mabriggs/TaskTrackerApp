name: Build and Deploy Docker to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Railway
      run: |
        npm install -g railway
        railway login --token ${{ secrets.RAILWAY_TOKEN }}

    - name: Deploy Docker image to Railway
      run: |
        railway up --service task-tracker
